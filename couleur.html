			<p class="intro">Pour changer la couleur d'arrière plan d'une page, il faut modifier la fonction "background-color:" Essayez juste en bas !</p>
			<div class="colorSystem" id="ColorDiv">
				<p class="fonction">background-color:</p>
				<button data-jscolor="{onInput: 'update(this)', value:'#000000', alpha:0}">
					Choisissez une couleur !
				</button>
			</div>
        
            <!-- <textarea id="story" name="story" rows="5" cols="33">
            Entrez le nom d'une couleur (rouge, vert, jaune, bleu, violet, etc.)...
            </textarea> -->
			<script src="script/jscolor.js"></script>

			<script>
				function update(picker) {
					console.log(picker.toString())
					if (picker.toString()=='#000000' | picker.toString()=='#FFFFFF') {
						document.body.style.backgroundImage = `url('${'https://www.publicdomainpictures.net/pictures/40000/nahled/black-background-1365087945eJf.jpg'}')`;
					} else {
						document.body.style.background = picker.toString();
					}
				}

				jscolor.trigger('input'); // triggers 'onInput' on all color pickers when they are ready
			</script>


        </body>
